<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Mini - Dashboard Giáo viên (Nâng cấp)</title>
    <!-- Thư viện -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { max-width: 1400px; margin: 0 auto; padding: 20px; background: #f5f7fb; }
        h1, h2 { color: #1e3c72; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; }
        .file-group { margin: 10px 0; flex: 1; }
        input, button, select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0f2b4f; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ccc; padding: 8px 10px; text-align: center; }
        th { background: #e2e8f0; }
        .total-row { background: #fef9e3; font-weight: bold; }
        .badge { background: #e2e8f0; padding: 4px 12px; border-radius: 20px; display: inline-block; margin: 5px; }
        .warning { background: #fee2e2; border-left: 6px solid #dc2626; padding: 12px; margin: 15px 0; }
        textarea { width: 100%; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .nav-tab { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ccc; }
        .nav-tab button { background: #e2e8f0; color: #1e3c72; margin-right: 5px; }
        .nav-tab button.active { background: #1e3c72; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
<h1>📊 LMS Mini – Dashboard Giáo viên (Nâng cấp)</h1>

<div class="nav-tab">
    <button data-tab="stats" class="active">📈 Thống kê điểm</button>
    <button data-tab="history">📜 Lịch sử & Cảnh báo bỏ bài</button>
    <button data-tab="search">🔍 Tra cứu điểm học sinh</button>
    <button data-tab="export">📄 Xuất báo cáo PDF</button>
</div>

<!-- Tab Thống kê điểm -->
<div id="tab-stats" class="tab-content active">
    <div class="card">
        <div class="flex-row">
            <div class="file-group">
                <label><strong>1. Upload file Excel kết quả</strong></label>
                <input type="file" id="resultFile" accept=".xlsx, .xls, .csv">
            </div>
            <div class="file-group">
                <label><strong>2. Hoặc nhập link Google Sheet (CSV)</strong></label>
                <input type="text" id="gsheetUrl" placeholder="https://docs.google.com/.../pub?output=csv" style="width:100%">
                <button id="loadGsheetBtn" style="margin-top:5px;">📥 Đọc từ Google Sheet</button>
            </div>
            <div class="file-group">
                <label><strong>3. File danh sách lớp (cột 'Lớp', 'Tên HS')</strong></label>
                <input type="file" id="rosterFile" accept=".xlsx, .xls, .csv">
            </div>
        </div>
        <div class="flex-row" style="margin-top:10px;">
            <div class="file-group">
                <label><strong>Chọn tuần (để lưu lịch sử)</strong></label>
                <input type="text" id="weekInput" placeholder="VD: 2026-W22">
                <button id="saveHistoryBtn">💾 Lưu kết quả tuần này</button>
            </div>
            <div class="file-group">
                <button id="generateBtn" style="margin-top:24px;">📈 Tạo bảng thống kê</button>
            </div>
        </div>
        <div id="status" class="badge">Chưa có dữ liệu</div>
    </div>
    <div id="statsTableContainer" style="overflow-x: auto;"></div>
</div>

<!-- Tab Lịch sử & Cảnh báo bỏ bài -->
<div id="tab-history" class="tab-content">
    <div class="card">
        <h2>📜 Lịch sử kết quả các tuần</h2>
        <div id="historyList"></div>
        <button id="clearHistoryBtn">🗑️ Xóa toàn bộ lịch sử</button>
        <h2>⚠️ Học sinh có nguy cơ bỏ bài (vắng 2 tuần liên tiếp)</h2>
        <div id="riskStudents"></div>
    </div>
</div>

<!-- Tab Tra cứu điểm học sinh -->
<div id="tab-search" class="tab-content">
    <div class="card">
        <h2>🔍 Tra cứu điểm cá nhân</h2>
        <input type="text" id="searchName" placeholder="Nhập Lớp_Tên (VD: 11A4_Lưu Chí Thức)" style="width: 70%;">
        <button id="searchScoreBtn">Tra cứu</button>
        <div id="searchResult" style="margin-top: 20px;"></div>
    </div>
</div>

<!-- Tab Xuất PDF -->
<div id="tab-export" class="tab-content">
    <div class="card">
        <h2>📄 Xuất báo cáo thống kê hiện tại thành PDF</h2>
        <button id="exportPdfBtn">Xuất PDF</button>
        <div id="pdfPreview" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    // ---------- Khởi tạo biến toàn cục ----------
    let resultData = [];       // mảng {lop, ten, score}
    let classRoster = new Map(); // Map<lop, Set<ten>>
    let currentStatsHtml = "";   // lưu html bảng thống kê để xuất PDF

    const STORAGE_KEY = "examHistory";

    // ---------- Helper: lấy ngày hôm nay YYYY-MM-DD ----------
    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ---------- Đọc file Excel ----------
    function readFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                resolve(rows);
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    // Parse CSV đơn giản
    function parseCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.trim());
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = lines[i].split(',');
            let obj = {};
            headers.forEach((h, idx) => { obj[h] = values[idx] ? values[idx].trim() : ""; });
            rows.push(obj);
        }
        return rows;
    }

    // Xử lý dữ liệu thô -> resultData (lấy bài làm mới nhất mỗi HS, chỉ lấy có dấu '_')
    function processResultRows(rows) {
        const headers = rows.length ? Object.keys(rows[0]) : [];
        const timestampCol = headers.find(h => h.includes("Dấu thời gian") || h.toLowerCase().includes("timestamp")) || headers[0];
        const nameCol = headers.find(h => h.includes("Tên HS") || h === "Tên HS");
        const scoreCol = headers.find(h => h === "Điểm" || h.includes("Điểm"));
        if (!nameCol) throw new Error("Không tìm thấy cột 'Tên HS'");

        const valid = rows.filter(row => row[nameCol] && row[nameCol].includes("_"));
        valid.sort((a,b) => new Date(a[timestampCol]) - new Date(b[timestampCol]));
        const latestMap = new Map();
        for (const row of valid) {
            const full = row[nameCol];
            const underIdx = full.indexOf("_");
            const lop = full.substring(0, underIdx).trim();
            const ten = full.substring(underIdx+1).trim();
            const key = `${lop}||${ten}`;
            const score = parseFloat(row[scoreCol]) || 0;
            latestMap.set(key, { lop, ten, score });
        }
        return Array.from(latestMap.values());
    }

    // Xử lý file danh sách lớp
    function processRosterRows(rows) {
        const headers = rows.length ? Object.keys(rows[0]) : [];
        const classCol = headers.find(h => h === "Lớp" || h.toLowerCase() === "lop");
        const nameCol = headers.find(h => h === "Tên HS" || h === "Họ tên" || h.toLowerCase().includes("tên"));
        if (!classCol || !nameCol) throw new Error("File danh sách cần cột 'Lớp' và 'Tên HS'");
        const roster = new Map();
        for (const row of rows) {
            let lop = row[classCol]?.toString().trim();
            let ten = row[nameCol]?.toString().trim();
            if (lop && ten) {
                if (!roster.has(lop)) roster.set(lop, new Set());
                roster.get(lop).add(ten);
            }
        }
        return roster;
    }

    // Phân khoảng điểm
    function getScoreRange(score) {
        if (score <= 1.0) return "≤1.0";
        if (score <= 2.0) return "1.0<2.0";
        if (score <= 3.5) return "2.0<3.5";
        if (score <= 5.0) return "3.5<5.0";
        if (score <= 6.5) return "5<6.5";
        if (score <= 8.0) return "6.5<8";
        if (score <= 9.0) return "8<9";
        return "9<10";
    }

    // Tạo bảng thống kê (lưu vào currentStatsHtml)
    function generateStats() {
        if (!resultData.length) {
            document.getElementById("statsTableContainer").innerHTML = '<div class="card">⚠️ Chưa có dữ liệu kết quả.</div>';
            return;
        }
        const classScores = new Map();
        for (let item of resultData) {
            if (!classScores.has(item.lop)) classScores.set(item.lop, []);
            classScores.get(item.lop).push(item.score);
        }
        const allClasses = new Set([...classScores.keys(), ...classRoster.keys()]);
        const sortedClasses = Array.from(allClasses).sort();
        const ranges = ["≤1.0", "1.0<2.0", "2.0<3.5", "3.5<5.0", "5<6.5", "6.5<8", "8<9", "9<10"];
        
        let html = `<div class="card" id="statsCard"><h2>📋 THỐNG KÊ ĐIỂM THI THEO LẦN - ${getToday()}</h2>
        <table><thead><tr><th>MÔN</th><th>Lớp</th><th>Sĩ số</th>${ranges.map(r=>`<th>${r}<br>SL</th>`).join('')}<th>Lần điểm ≥5</th><th>Điểm TB</th></tr>
        <tr><td colspan="3"></td>${ranges.map(()=>`<th>SL</th>`).join('')}<th>SL</th><th>%</th><th></th></tr></thead><tbody>`;
        
        let totalAll = { count:0, sum:0, totalStudents:0, rangeCounts: new Array(ranges.length).fill(0), ge5Count:0 };
        for (let lop of sortedClasses) {
            const scores = classScores.get(lop) || [];
            const rosterSet = classRoster.get(lop);
            const siSo = rosterSet ? rosterSet.size : (scores.length > 0 ? scores.length : 0);
            const rangeCount = new Array(ranges.length).fill(0);
            let sum = 0;
            for (let s of scores) { sum += s; const idx = ranges.indexOf(getScoreRange(s)); if (idx!==-1) rangeCount[idx]++; }
            const soLuong = scores.length;
            const ge5 = scores.filter(s=>s>=5).length;
            const percentGe5 = soLuong ? ((ge5/soLuong)*100).toFixed(2) : "0.00";
            const avg = soLuong ? (sum/soLuong).toFixed(2) : "0.00";
            totalAll.count += soLuong; totalAll.sum += sum; totalAll.totalStudents += siSo;
            for (let i=0;i<ranges.length;i++) totalAll.rangeCounts[i] += rangeCount[i];
            totalAll.ge5Count += ge5;
            html += `<tr><td>Toán</td><td>${lop}</td><td>${siSo}</td>${rangeCount.map(c=>`<td>${c}</td>`).join('')}<td>${ge5}</td><td>${percentGe5}%</td><td>${avg}</td></tr>`;
        }
        const totalAvg = totalAll.count ? (totalAll.sum/totalAll.count).toFixed(2) : "0.00";
        const totalPercentGe5 = totalAll.count ? ((totalAll.ge5Count/totalAll.count)*100).toFixed(2) : "0.00";
        html += `<tr class="total-row"><td colspan="2"><strong>Tổng</strong></td><td><strong>${totalAll.totalStudents}</strong></td>${totalAll.rangeCounts.map(c=>`<td><strong>${c}</strong></td>`).join('')}<td><strong>${totalAll.ge5Count}</strong></td><td><strong>${totalPercentGe5}%</strong></td><td><strong>${totalAvg}</strong></td></tr>`;
        html += `</tbody></table><div class="note">* Sĩ số từ danh sách lớp (nếu có).</div></div>`;
        document.getElementById("statsTableContainer").innerHTML = html;
        currentStatsHtml = html;
        return html;
    }

    // Lưu lịch sử tuần hiện tại
    function saveCurrentWeek() {
        const week = document.getElementById("weekInput").value.trim();
        if (!week) { alert("Vui lòng nhập tuần (VD: 2026-W22)"); return; }
        if (!resultData.length) { alert("Chưa có dữ liệu kết quả. Hãy tải file hoặc Google Sheet trước."); return; }
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        // Lưu danh sách tên HS đã làm (dạng "Lớp_Tên")
        const studentList = resultData.map(item => `${item.lop}_${item.ten}`);
        history[week] = studentList;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        alert(`Đã lưu kết quả tuần ${week} với ${studentList.length} học sinh.`);
        renderHistoryTab();
    }

    // Hiển thị lịch sử và cảnh báo bỏ bài
    function renderHistoryTab() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const weeks = Object.keys(history).sort();
        let html = `<ul>`;
        for (let w of weeks) {
            html += `<li><strong>${w}</strong>: ${history[w].length} HS đã làm</li>`;
        }
        html += `</ul>`;
        document.getElementById("historyList").innerHTML = html || "<p>Chưa có lịch sử.</p>";

        // Phát hiện học sinh vắng 2 tuần liên tiếp (dựa trên danh sách lớp đã upload)
        if (classRoster.size === 0) {
            document.getElementById("riskStudents").innerHTML = "<p>Hãy upload file danh sách lớp để theo dõi bỏ bài.</p>";
            return;
        }
        const sortedWeeks = weeks.slice(-4); // lấy 4 tuần gần nhất
        if (sortedWeeks.length < 2) {
            document.getElementById("riskStudents").innerHTML = "<p>Cần ít nhất 2 tuần dữ liệu để phát hiện.</p>";
            return;
        }
        // Tạo map: tên HS -> mảng các tuần có mặt
        let attendance = new Map(); // key: "Lớp_Tên", value: Set week
        for (let w of sortedWeeks) {
            history[w].forEach(studentKey => {
                if (!attendance.has(studentKey)) attendance.set(studentKey, new Set());
                attendance.get(studentKey).add(w);
            });
        }
        let riskList = [];
        for (let [lop, students] of classRoster.entries()) {
            for (let ten of students) {
                const key = `${lop}_${ten}`;
                let missingCount = 0;
                for (let i = 0; i < sortedWeeks.length; i++) {
                    const w = sortedWeeks[i];
                    if (attendance.get(key)?.has(w)) missingCount = 0;
                    else missingCount++;
                    if (missingCount >= 2) {
                        riskList.push({ lop, ten, lastWeeks: sortedWeeks.slice(i-1, i+1) });
                        break;
                    }
                }
            }
        }
        if (riskList.length === 0) {
            document.getElementById("riskStudents").innerHTML = "<div class='badge'>✅ Không có học sinh bỏ bài 2 tuần liên tiếp.</div>";
        } else {
            let riskHtml = `<div class="warning">⚠️ Các học sinh có nguy cơ bỏ bài (vắng 2 tuần gần nhất):<ul>`;
            riskList.forEach(r => {
                riskHtml += `<li>${r.lop}_${r.ten} (vắng tuần ${r.lastWeeks.join(", ")})</li>`;
            });
            riskHtml += `</ul></div>`;
            document.getElementById("riskStudents").innerHTML = riskHtml;
        }
    }

    // Tra cứu điểm cá nhân từ dữ liệu hiện tại
    function searchStudentScore() {
        const name = document.getElementById("searchName").value.trim();
        if (!name) return;
        if (!resultData.length) {
            document.getElementById("searchResult").innerHTML = "<p>Chưa có dữ liệu kết quả. Hãy tải file hoặc Google Sheet trước.</p>";
            return;
        }
        const found = resultData.filter(item => `${item.lop}_${item.ten}` === name);
        if (found.length === 0) {
            document.getElementById("searchResult").innerHTML = `<p>Không tìm thấy học sinh "${name}" trong dữ liệu hiện tại.</p>`;
            return;
        }
        let html = `<h3>Điểm của ${name}</h3><ul>`;
        found.forEach(f => {
            html += `<li>Điểm: ${f.score}</li>`;
        });
        html += `</ul>`;
        document.getElementById("searchResult").innerHTML = html;
    }

    // Xuất PDF
    async function exportToPDF() {
        if (!currentStatsHtml) {
            alert("Chưa có bảng thống kê. Hãy nhấn 'Tạo bảng thống kê' trước.");
            return;
        }
        const element = document.getElementById("statsCard");
        if (!element) return;
        const canvas = await html2canvas(element, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('landscape', 'mm', 'a4');
        const imgWidth = 280;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
        pdf.save(`thong_ke_${getToday()}.pdf`);
    }

    // Xóa lịch sử
    document.getElementById("clearHistoryBtn")?.addEventListener("click", () => {
        if (confirm("Xóa toàn bộ lịch sử các tuần?")) {
            localStorage.removeItem(STORAGE_KEY);
            renderHistoryTab();
        }
    });

    // ---------- Xử lý upload file ----------
    let resultFileLoaded = false, rosterFileLoaded = false;

    document.getElementById("resultFile").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById("status").innerHTML = "Đang đọc file Excel...";
        try {
            const rows = await readFile(file);
            resultData = processResultRows(rows);
            resultFileLoaded = true;
            document.getElementById("status").innerHTML = `✅ Đã đọc Excel: ${resultData.length} học sinh có bài làm.`;
            if (rosterFileLoaded) generateStats();
            else generateStats(); // vẫn tạo bảng nếu có kết quả
        } catch(err) { alert("Lỗi: "+err.message); }
    });

    document.getElementById("loadGsheetBtn").addEventListener("click", async () => {
        let url = document.getElementById("gsheetUrl").value.trim();
        if (!url) return alert("Nhập link Google Sheet (CSV)");
        document.getElementById("status").innerHTML = "Đang đọc Google Sheet...";
        try {
            const res = await fetch(url);
            const csvText = await res.text();
            const rows = parseCSV(csvText);
            resultData = processResultRows(rows);
            resultFileLoaded = true;
            document.getElementById("status").innerHTML = `✅ Đã đọc Google Sheet: ${resultData.length} học sinh.`;
            if (rosterFileLoaded) generateStats();
            else generateStats();
        } catch(e) { alert("Lỗi đọc Google Sheet: "+e.message); }
    });

    document.getElementById("rosterFile").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const rows = await readFile(file);
            classRoster = processRosterRows(rows);
            rosterFileLoaded = true;
            document.getElementById("status").innerHTML = `✅ Đã đọc danh sách lớp: ${classRoster.size} lớp.`;
            if (resultFileLoaded) generateStats();
        } catch(err) { alert("Lỗi: "+err.message); }
    });

    document.getElementById("generateBtn").addEventListener("click", () => {
        if (!resultFileLoaded) alert("Hãy tải file kết quả hoặc Google Sheet trước.");
        else generateStats();
    });
    document.getElementById("saveHistoryBtn").addEventListener("click", saveCurrentWeek);
    document.getElementById("searchScoreBtn").addEventListener("click", searchStudentScore);
    document.getElementById("exportPdfBtn").addEventListener("click", exportToPDF);

    // Tab switching
    document.querySelectorAll(".nav-tab button").forEach(btn => {
        btn.addEventListener("click", () => {
            const tabId = btn.getAttribute("data-tab");
            document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
            document.getElementById(`tab-${tabId}`).classList.add("active");
            document.querySelectorAll(".nav-tab button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (tabId === "history") renderHistoryTab();
        });
    });

    // Khởi tạo lịch sử
    renderHistoryTab();
</script>
</body>
</html>
