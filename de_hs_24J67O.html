<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.app{max-width:760px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h1{font-size:20px;font-weight:700;color:#1e3a5f;margin-bottom:4px}
.meta{font-size:13px;color:#64748b;margin-bottom:16px}
.countdown{text-align:center;padding:32px;background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:16px;color:#fff;margin-bottom:16px}
.countdown .big{font-size:48px;font-weight:900;letter-spacing:2px;font-variant-numeric:tabular-nums}
.countdown .lbl{font-size:14px;opacity:.8;margin-top:4px}
.timer-bar{background:#e2e8f0;border-radius:99px;height:8px;margin-bottom:16px;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,#16a34a,#65a30d);border-radius:99px;transition:width 1s linear}
.timer-fill.warn{background:linear-gradient(90deg,#f59e0b,#d97706)}
.timer-fill.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}
.timer-txt{text-align:center;font-size:18px;font-weight:700;color:#1e3a5f;margin-bottom:4px}
.q-wrap{margin-bottom:24px}
.q-num{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:6px}
.q-stem{font-size:15px;line-height:1.7;margin-bottom:14px}
.choice-list{display:flex;flex-direction:column;gap:8px}
.choice{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .15s;background:#fff;text-align:left}
.choice:hover{border-color:#2563eb;background:#eff6ff}
.choice.selected{border-color:#2563eb;background:#dbeafe}
.choice.correct{border-color:#16a34a;background:#dcfce7}
.choice.wrong{border-color:#ef4444;background:#fee2e2}
.choice-key{font-weight:700;color:#2563eb;min-width:20px;flex-shrink:0}
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tf-item{border:1.5px solid #e2e8f0;border-radius:10px;padding:10px}
.tf-item .tf-stem{font-size:13px;margin-bottom:6px;line-height:1.5}
.tf-btn-row{display:flex;gap:6px}
.tf-btn{flex:1;padding:6px;border:1.5px solid #e2e8f0;border-radius:7px;cursor:pointer;font-weight:600;font-size:12px;background:#fff;transition:all .15s}
.tf-btn.sel-T{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
.tf-btn.sel-F{background:#fce7f3;border-color:#db2777;color:#9d174d}
.tf-btn.ok-T{background:#dcfce7;border-color:#16a34a;color:#15803d}
.tf-btn.ok-F{background:#fee2e2;border-color:#ef4444;color:#b91c1c}
.sa-input{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;transition:border-color .15s}
.sa-input:focus{border-color:#2563eb}
.sa-input.correct{border-color:#16a34a;background:#dcfce7}
.sa-input.wrong{border-color:#ef4444;background:#fee2e2}
.nav{display:flex;gap:8px;align-items:center;margin-top:24px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:#2563eb;color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-g{background:#16a34a;color:#fff}.btn-g:hover{background:#15803d}
.btn-ghost{background:#f1f5f9;color:#475569}.btn-ghost:hover{background:#e2e8f0}
.dots{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.dot{width:28px;height:28px;border-radius:6px;border:1.5px solid #e2e8f0;background:#fff;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b;transition:all .15s}
.dot.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
.dot.current{background:#2563eb;color:#fff;border-color:#2563eb}
.result-card{text-align:center;padding:32px}
.result-score{font-size:56px;font-weight:900;margin:8px 0}
.result-label{font-size:14px;color:#64748b}
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge-ok{background:#dcfce7;color:#166534}
.badge-fail{background:#fee2e2;color:#991b1b}
.badge-partial{background:#fef3c7;color:#92400e}
.loigiai-wrap{background:#f8fafc;border-left:3px solid #2563eb;padding:10px 14px;border-radius:0 8px 8px 0;margin-top:10px;font-size:13px;line-height:1.7}
.closed-banner{text-align:center;padding:40px;color:#6b7280}
.closed-banner .icon{font-size:48px;margin-bottom:12px}
@media(max-width:600px){.tf-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- State: waiting | open | closed | result -->
  <div id="scr-waiting" style="display:none">
    <div class="countdown" id="countdown-box">
      <div style="font-size:14px;margin-bottom:8px;opacity:.8">⏳ Đề mở lúc</div>
      <div class="big" id="countdown-time">--:--:--</div>
      <div class="lbl" id="countdown-date"></div>
    </div>
    <div class="card" style="text-align:center">
      <h1>Kiểm tra</h1>
      <p class="meta">25 câu · 45 phút · Chờ đến giờ mở để vào làm bài</p>
    </div>
  </div>

  <div id="scr-closed" style="display:none">
    <div class="card closed-banner">
      <div class="icon">🔒</div>
      <h1>Đề đã đóng</h1>
      <p style="margin-top:8px;color:#6b7280">Hết thời gian nộp bài. Hãy liên hệ giáo viên.</p>
    </div>
  </div>

  <div id="scr-login" style="display:none">
    <div class="card">
      <h1>📝 Kiểm tra</h1>
      <p class="meta">25 câu · 45 phút làm bài</p>
      <div style="margin-top:16px" id="login-form">
        <!-- Nếu có danh sách HS: dropdown + password; nếu không: free text -->
        <div id="login-list-mode" style="display:none">
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Chọn tên học sinh</label>
          <select id="stu-select" style="width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;background:#fff"
                  onchange="onStuSelectChange()">
            <option value="">-- Chọn tên của bạn --</option>
          </select>
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;margin-top:12px">Mật khẩu</label>
          <input id="stu-pw" type="password" placeholder="Nhập mật khẩu..."
                 style="width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none"
                 onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#e2e8f0'"
                 onkeydown="if(event.key==='Enter')startExam()">
        </div>
        <div id="login-free-mode" style="display:none">
          <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Họ và tên</label>
          <input id="stu-name-free" type="text" placeholder="Nhập họ tên của bạn..."
                 style="width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none"
                 onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#e2e8f0'"
                 onkeydown="if(event.key==='Enter')startExam()">
        </div>
        <p id="login-err" style="color:#ef4444;font-size:12px;margin-top:6px;display:none"></p>
        <div id="already-done-msg" style="display:none;margin-top:10px;padding:12px;background:#fef3c7;border-radius:8px;font-size:13px;color:#92400e;text-align:center">
          ⚠️ Bạn đã nộp bài rồi. Mỗi học sinh chỉ được làm 1 lần.
        </div>
        <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:12px" onclick="startExam()">
          🚀 Bắt đầu làm bài
        </button>
      </div>
      <p style="font-size:11px;color:#94a3b8;text-align:center;margin-top:10px">Đề mở ngay · Không hẹn giờ</p>
    </div>
  </div>

  <div id="scr-exam" style="display:none">
    <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div class="timer-txt" id="timer-txt">--:--</div>
        <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
      </div>
      <button class="btn btn-g" onclick="confirmSubmit()" id="submit-btn">✅ Nộp bài</button>
    </div>
    <div class="dots" id="dot-wrap"></div>
    <div id="q-area"></div>
    <div class="nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="navigate(-1)">◀ Trước</button>
      <span style="flex:1;text-align:center;font-size:13px;color:#64748b" id="q-pos"></span>
      <button class="btn btn-ghost" id="btn-next" onclick="navigate(1)">Tiếp ▶</button>
    </div>
  </div>

  <div id="scr-result" style="display:none">
    <div class="card result-card">
      <div id="result-emoji" style="font-size:48px"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-label" id="result-label"></div>
      <div style="margin-top:12px;font-size:13px;color:#64748b" id="result-meta"></div>
      <div id="result-submit-status" style="margin-top:12px;font-size:13px"></div>
    </div>
    <div id="result-detail"></div>
  </div>
</div>

    return;
  }
  // Đã qua giờ mở hoặc không hẹn giờ
  var current = getCurrentScr();
  if(current === 'waiting' || current === ''){
    showScr('login');
  }
}

function getCurrentScr(){
  for(var id of ['waiting','closed','login','exam','result']){
    if(document.getElementById('scr-'+id).style.display !== 'none') return id;
  }
  return '';
}
function showScr(name){
  ['waiting','closed','login','exam','result'].forEach(function(s){
    document.getElementById('scr-'+s).style.display = s===name ? '' : 'none';
  });
}

// ── Countdown ─────────────────────────────────────────────────────────────
function tickCountdown(){
  var diff = OPEN_AT - Date.now();
  if(diff <= 0){ checkPhase(); return; }
  var h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  var txt = (h?h+'g ':'')+pad(m)+'p'+pad(s)+'s';
  document.getElementById('countdown-time').textContent = txt;
  var d = new Date(OPEN_AT);
  document.getElementById('countdown-date').textContent =
    'lúc '+pad(d.getHours())+':'+pad(d.getMinutes())+' · '+d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
  setTimeout(tickCountdown, 1000);
}

// ── Login ──────────────────────────────────────────────────────────────────
function onStuSelectChange(){
  var sel = document.getElementById('stu-select');
  var name = sel.value;
  var err = document.getElementById('login-err');
  var doneMsg = document.getElementById('already-done-msg');
  err.style.display = 'none';
  if(name && hasDoneExam(name)){
    doneMsg.style.display = '';
  } else {
    doneMsg.style.display = 'none';
  }
}

function hasDoneExam(name){
  try{ return !!localStorage.getItem('done_'+EXAM_CODE+'_'+name); }catch(e){ return false; }
}
function markDoneExam(name){
  try{ localStorage.setItem('done_'+EXAM_CODE+'_'+name, '1'); }catch(e){}
}

function initLoginMode(){
  if(STU_LIST && STU_LIST.length > 0){
    document.getElementById('login-list-mode').style.display = '';
    document.getElementById('login-free-mode').style.display = 'none';
    var sel = document.getElementById('stu-select');
    STU_LIST.forEach(function(s){
      var opt = document.createElement('option');
      opt.value = s.name; opt.textContent = s.name;
      sel.appendChild(opt);
    });
  } else {
    document.getElementById('login-list-mode').style.display = 'none';
    document.getElementById('login-free-mode').style.display = '';
  }
}

function startExam(){
  var err = document.getElementById('login-err');
  var doneMsg = document.getElementById('already-done-msg');
  err.style.display = 'none'; doneMsg.style.display = 'none';
  var name = '';
  if(STU_LIST && STU_LIST.length > 0){
    var sel = document.getElementById('stu-select');
    name = (sel.value||'').trim();
    if(!name){
      err.textContent='Vui lòng chọn tên của bạn'; err.style.display=''; sel.focus(); return;
    }
    // Check already done
    if(hasDoneExam(name)){
      doneMsg.style.display = ''; return;
    }
    // Check password
    var pwInp = document.getElementById('stu-pw');
    var pw = (pwInp.value||'').trim();
    var stuObj = STU_LIST.find(function(s){return s.name===name;});
    if(!pw){ err.textContent='Vui lòng nhập mật khẩu'; err.style.display=''; pwInp.focus(); return; }
    if(!stuObj || pw.toUpperCase() !== stuObj.pw.toUpperCase()){
      err.textContent='Mật khẩu không đúng. Hỏi giáo viên nếu quên.'; err.style.display=''; pwInp.focus(); return;
    }
  } else {
    var freeInp = document.getElementById('stu-name-free');
    name = (freeInp.value||'').trim();
    if(!name || name.length < 2){
      err.textContent='Vui lòng nhập họ tên (ít nhất 2 ký tự)'; err.style.display=''; freeInp.focus(); return;
    }
    if(hasDoneExam(name)){
      doneMsg.style.display = ''; return;
    }
  }
  stuName = name;
  qs = ALL_QS.slice();
  if(SHUFFLE_C) qs.forEach(function(q){
    if(q.choices && q.choices.length > 1){
      var withIdx = q.choices.map(function(c,i){return {c,orig:i};});
      shuffle(withIdx);
      q._choiceOrder = withIdx.map(function(x){return x.orig;});
      q.choices = withIdx.map(function(x){return x.c;});
    }
  });
  ans = qs.map(function(q){ return q.qtype==='choiceTF'? new Array(q.choices.length).fill(null): null; });
  cur = 0;
  startEpoch = Date.now();
  showScr('exam');
  buildDots();
  renderQ(cur);
  startTimer();
  // Autosave mỗi 30s
  setInterval(autosaveDraft, 30000);
}

// ── Dots ───────────────────────────────────────────────────────────────────
function buildDots(){
  var wrap = document.getElementById('dot-wrap');
  wrap.innerHTML = qs.map(function(q,i){
    return '<button class="dot" id="dot-'+i+'" onclick="goTo('+i+')">'+(i+1)+'</button>';
  }).join('');
  updateDots();
}
function updateDots(){
  qs.forEach(function(q,i){
    var d = document.getElementById('dot-'+i);
    if(!d) return;
    d.className = 'dot' + (isAnswered(i)?' answered':'') + (i===cur?' current':'');
    if(i===cur && isAnswered(i)) d.className = 'dot answered current';
  });
  document.getElementById('q-pos').textContent = 'Câu '+(cur+1)+' / '+qs.length;
}
function isAnswered(i){
  var a=ans[i], q=qs[i];
  if(q.qtype==='choiceTF') return Array.isArray(a) && a.some(function(v){return v!==null;});
  return a !== null && a !== undefined && a !== '';
}

// ── Render question ────────────────────────────────────────────────────────
function renderQ(idx){
  cur = idx;
  var q=qs[idx], area=document.getElementById('q-area');
  var typeLabel = q.qtype==='choice'?'Trắc nghiệm':q.qtype==='choiceTF'?'Đúng/Sai':'Trả lời ngắn';
  var diffLabel = ['','Nhận biết','Thông hiểu','Vận dụng','Vận dụng cao'][q.mucDo||1]||'';
  var html = '<div class="q-wrap mj">';
  html += '<div class="q-num">Câu '+(idx+1)+' · <span style="color:#7c3aed">'+typeLabel+'</span>'+(diffLabel?' · '+diffLabel:'')+'</div>';
  html += '<div class="q-stem">'+q.stem+'</div>';
  if(q.qtype==='choice'){
    html += '<div class="choice-list">';
    (q.choices||[]).forEach(function(c,ci){
      var sel = ans[idx]===ci;
      html += '<button class="choice'+(sel?' selected':'')+'" onclick="selectChoice('+ci+')">'
            + '<span class="choice-key">'+keys[ci]+'.</span><span>'+c.text+'</span></button>';
    });
    html += '</div>';
  } else if(q.qtype==='choiceTF'){
    html += '<div class="tf-grid">';
    (q.choices||[]).forEach(function(c,ci){
      var a = Array.isArray(ans[idx]) ? ans[idx][ci] : null;
      html += '<div class="tf-item mj"><div class="tf-stem">'+keys[ci]+'. '+c.text+'</div>'
            + '<div class="tf-btn-row">'
            + '<button class="tf-btn'+(a===true?' sel-T':'')+'" onclick="selectTF('+ci+',true)">Đúng</button>'
            + '<button class="tf-btn'+(a===false?' sel-F':'')+'" onclick="selectTF('+ci+',false)">Sai</button>'
            + '</div></div>';
    });
    html += '</div>';
  } else {
    html += '<input class="sa-input mj" type="text" placeholder="Nhập đáp án..." value="'
          + ((ans[idx]||'')+'').replace(/"/g,'&quot;')
          + '" oninput="ans[cur]=this.value" onchange="updateDots()">';
  }
  html += '</div>';
  area.innerHTML = html;
  // Navigation buttons
  // Ẩn nút Trước nếu chế độ no_prev hoặc must_answer
  var showPrev = (idx > 0) && (NAV_MODE === 'free');
  document.getElementById('btn-prev').style.visibility = showPrev ? 'visible' : 'hidden';
  document.getElementById('btn-next').style.visibility = idx<qs.length-1 ? 'visible':'hidden';
  updateDots();
  // MathJax
  if(window.MathJax && MathJax.typesetPromise){
    try{ MathJax.typesetPromise([area]).catch(function(){}); }catch(e){}
  }
}

function selectChoice(ci){
  ans[cur]=ci; updateDots();
  document.querySelectorAll('.choice').forEach(function(el,i){ el.classList.toggle('selected', i===ci); });
  autosaveDraft();
}
function selectTF(ci,val){
  if(!Array.isArray(ans[cur])) ans[cur]=new Array(qs[cur].choices.length).fill(null);
  ans[cur][ci]=val; updateDots();
  renderQ(cur); // re-render to show selected state
  autosaveDraft();
}
function navigate(dir){
  // Chế độ điều hướng chống gian lận
  if(dir === -1){
    if(NAV_MODE === 'no_prev'){
      // Không cho xem lại câu trước
      return;
    }
    if(NAV_MODE === 'must_answer'){
      // Phải trả lời câu hiện tại mới được đi tiếp (về trước cũng không nếu chưa trả lời)
      if(!isAnswered(cur)){ alert('Vui lòng trả lời câu này trước khi chuyển.'); return; }
    }
  }
  if(dir === 1 && NAV_MODE === 'must_answer'){
    if(!isAnswered(cur)){ alert('Vui lòng trả lời câu này trước khi chuyển.'); return; }
  }
  goTo(cur+dir);
}
function goTo(idx){
  if(idx<0||idx>=qs.length) return;
  if(idx<cur){
    if(NAV_MODE==='no_prev') return;
    if(NAV_MODE==='must_answer'&&!isAnswered(cur)){ alert('Vui lòng trả lời câu này trước khi chuyển.'); return; }
  }
  cur=idx; renderQ(idx);
}

// ── Timer ──────────────────────────────────────────────────────────────────
function startTimer(){
  var totalSec = EXAM_DUR*60;
  timerInterval = setInterval(function(){
    var elapsed = (Date.now()-startEpoch)/1000;
    var remain  = Math.max(0, totalSec-elapsed);
    var m=Math.floor(remain/60), s=Math.floor(remain%60);
    document.getElementById('timer-txt').textContent = pad(m)+':'+pad(s);
    var pct = remain/totalSec*100;
    var fill = document.getElementById('timer-fill');
    fill.style.width = pct+'%';
    fill.className   = 'timer-fill'+(pct<20?' danger':pct<40?' warn':'');
    if(remain<=0){ clearInterval(timerInterval); autoSubmitTimeout(); }
  }, 1000);
}

// ── Submit ─────────────────────────────────────────────────────────────────
function confirmSubmit(){
  var done  = qs.filter(function(_,i){return isAnswered(i);}).length;
  var total = qs.length;
  if(done < total){
    if(!confirm('Còn '+(total-done)+' câu chưa trả lời. Nộp bài?')) return;
  }
  doSubmit(false, 0);
}
function autoSubmitTimeout(){
  clearInterval(timerInterval);
  doSubmit(true, Math.round((Date.now()-startEpoch)/1000 - EXAM_DUR*60));
}
function autosaveDraft(){
  try{ localStorage.setItem('draft_'+EXAM_CODE+'_'+stuName, JSON.stringify({ans,ts:Date.now()})); }catch(e){}
}

function doSubmit(late, overSec){
  if(submitted) return; submitted=true;
  clearInterval(timerInterval);
  markDoneExam(stuName);
  var elapsed = Math.round((Date.now()-startEpoch)/1000);
  var em=Math.floor(elapsed/60), es=elapsed%60;
  var result = scoreLocally(ans);
  result.name = stuName; result.late=late; result.over_sec=overSec||0;
  result.elapsed = pad(em)+'p'+pad(es)+'s';
  result.submitted_at = (function(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());})();
  showResult(result);
  pushToGsheet(result);
}

// ── Local scoring ──────────────────────────────────────────────────────────
function scoreLocally(finalAns){
  var total=qs.length, nOk=0, pts=0, details=[];
  function spq(qi){ var s=SECTIONS; if(!s.length)return 1; var off=0; for(var si=0;si<s.length;si++){if(qi>=off&&qi<off+s[si].count)return s[si].scorePerQ||1;off+=s[si].count;}return 1;}
  function mults(qi){ var s=SECTIONS; if(!s.length)return null; var off=0; for(var si=0;si<s.length;si++){if(qi>=off&&qi<off+s[si].count&&s[si].tf_mults)return s[si].tf_mults;off+=s[si].count;}return null;}
  qs.forEach(function(q,qi){
    var a=finalAns[qi], p=spq(qi), ok=false, qpts=0;
    if(q.qtype==='choice'){
      var cor=(q.choices||[]).findIndex(function(c){return c.correct;});
      ok=(a===cor&&a!==null); qpts=ok?p:0;
    }else if(q.qtype==='choiceTF'){
      var m=mults(qi)||[0,0.1,0.25,0.5,1.0], ch=q.choices||[], nok=0;
      if(Array.isArray(a)) ch.forEach(function(c,i){if(Boolean(a[i])===Boolean(c.correct))nok++;});
      var ratio=ch.length===4?(m[nok]||0):(nok/Math.max(ch.length,1));
      qpts=Math.round(ratio*p*1000)/1000; ok=(nok===ch.length);
    }else{
      var exp=(q.shortansAns||'').trim().toLowerCase();
      var giv=(String(a||'')).trim().toLowerCase();
      ok=(exp&&exp===giv); qpts=ok?p:0;
    }
    pts+=qpts; if(ok)nOk++;
    details.push({ok,pts:qpts,correct:q.qtype==='choice'?(q.choices||[]).findIndex(function(c){return c.correct;}):-1,ans:a,loigiai:q.loigiai||''});
  });
  var maxPts=SECTIONS.length?SECTIONS.reduce(function(s,sec){return s+sec.count*(sec.scorePerQ||1);},0):total;
  return {score:Math.round(Math.min(pts,maxPts)*100)/100, correct:nOk, total, details};
}

// ── Show result ────────────────────────────────────────────────────────────
function showResult(r){
  showScr('result');
  var sc=r.score, emoji=sc>=9?'🏆':sc>=7?'⭐':sc>=5?'😊':'💪';
  var col=sc>=8?'#16a34a':sc>=5?'#d97706':'#dc2626';
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-score').textContent=sc+'đ';
  document.getElementById('result-score').style.color=col;
  document.getElementById('result-label').textContent=r.correct+'/'+r.total+' câu đúng';
  document.getElementById('result-meta').textContent='Nộp: '+r.submitted_at+(r.late?' · ⚠ Muộn':'')+(r.elapsed?' · Làm: '+r.elapsed:'');
  if(SHOW_RES>=2){
    var html='';
    if(SHOW_RES>=3) qs.forEach(function(q,i){
      var d=r.details[i]||{};
      var statusCls=d.ok?'badge-ok':(q.qtype==='choiceTF'&&d.pts>0)?'badge-partial':'badge-fail';
      var statusTxt=d.ok?'Đúng':(q.qtype==='choiceTF'&&d.pts>0)?'+'+d.pts+'đ':'Sai';
      html+='<div class="card q-wrap mj" style="margin-bottom:10px">';
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      html+='<span style="font-size:12px;color:#64748b">Câu '+(i+1)+'</span>';
      html+='<span class="badge '+statusCls+'">'+statusTxt+'</span></div>';
      html+='<div class="q-stem" style="font-size:13px">'+q.stem+'</div>';
      if(q.qtype==='choice'&&SHOW_RES>=4){
        (q.choices||[]).forEach(function(c,ci){
          var isAns=d.ans===ci, isCor=c.correct;
          var style=isCor?'correct':isAns&&!isCor?'wrong':'';
          html+='<div class="choice '+style+'" style="margin-top:4px;pointer-events:none">'
               +'<span class="choice-key">'+keys[ci]+'.</span><span>'+c.text+'</span></div>';
        });
      }
      if(d.loigiai&&SHOW_RES>=4) html+='<div class="loigiai-wrap mj"><b>Lời giải:</b> '+d.loigiai+'</div>';
      html+='</div>';
    });
    document.getElementById('result-detail').innerHTML=html;
    if(window.MathJax&&MathJax.typesetPromise) try{MathJax.typesetPromise([document.getElementById('result-detail')]).catch(function(){});}catch(e){}
  }
}

// ── Push to Google Sheet ───────────────────────────────────────────────────
function pushToGsheet(result){
  var statusEl = document.getElementById('result-submit-status');
  var payload = {
    examCode: EXAM_CODE, name: result.name, score: result.score,
    correct: result.correct, total: result.total,
    submitted_at: result.submitted_at, late: result.late, elapsed: result.elapsed||''
  };
  // Save to localStorage always as backup
  try{ localStorage.setItem('result_'+EXAM_CODE+'_'+result.name, JSON.stringify(payload)); }catch(e){}

  if(!GSHEET_URL && !GFORM_URL){
    statusEl.innerHTML='<span style="color:#94a3b8;font-size:12px">💾 Đã lưu cục bộ (GV chưa cài URL nộp bài)</span>';
    return;
  }
  statusEl.innerHTML='<span style="color:#2563eb;font-size:12px">⏳ Đang nộp kết quả...</span>';

  var done = false;

  // ── Phương thức 1: Apps Script với no-cors ─────────────────────
  function tryAppsScript(){
    if(!GSHEET_URL) return tryGoogleForm();
    // no-cors: không đọc được response nhưng request VẪN đến server
    fetch(GSHEET_URL, {
      method: 'POST',
      mode:   'no-cors',
      body:   JSON.stringify(payload),
      headers: {'Content-Type': 'text/plain'}
    })
    .then(function(){
      // no-cors → response bị opaque, coi như thành công
      if(!done){ done=true;
        statusEl.innerHTML='<span style="color:#16a34a;font-size:12px">✅ Đã nộp vào Google Sheet!</span>';
      }
    })
    .catch(function(){
      tryGoogleForm(); // Thử Form nếu Script lỗi
    });
    // Sau 5s nếu chưa xác nhận → thử Form làm backup song song
    setTimeout(function(){ if(!done) tryGoogleForm(); }, 5000);
  }

  // ── Phương thức 2: Google Form (no-cors, luôn hoạt động) ───────
  function tryGoogleForm(){
    if(!GFORM_URL || !GFORM_ENTRIES) {
      if(!done) statusEl.innerHTML='<span style="color:#16a34a;font-size:12px">✅ Đã nộp! (xác nhận qua Apps Script)</span>';
      return;
    }
    var entries = GFORM_ENTRIES.split(',').map(function(s){return s.trim();});
    var vals = [result.name, result.score, result.correct, result.total,
                result.submitted_at, result.late?'Có':'', result.elapsed||''];
    var body = entries.map(function(e,i){
      return encodeURIComponent(e)+'='+encodeURIComponent(vals[i]||'');
    }).join('&');
    fetch(GFORM_URL, {
      method: 'POST',
      mode:   'no-cors',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body:    body
    })
    .then(function(){
      if(!done){ done=true;
        statusEl.innerHTML='<span style="color:#16a34a;font-size:12px">✅ Đã nộp vào Google Sheet! (qua Form)</span>';
      }
    })
    .catch(function(){
      if(!done) statusEl.innerHTML='<span style="color:#ef4444;font-size:12px">⚠ Không gửi được mạng. Đã lưu cục bộ — chụp màn hình gửi GV.</span>';
    });
  }

  tryAppsScript();
}

function pad(n){return String(Math.floor(n)).padStart(2,'0');}
