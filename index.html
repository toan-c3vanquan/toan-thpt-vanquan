<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>LMS Toán - Debug</title>
    <style>
        body { font-family: monospace; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f0f0; }
        .debug { background: #fff; border: 1px solid #ccc; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>🔍 Kiểm tra trạng thái đề</h1>
    <div id="debugInfo" class="debug">Đang tải...</div>
    <div id="deList"></div>

    <script>
        (async function() {
            const debugDiv = document.getElementById('debugInfo');
            const deListDiv = document.getElementById('deList');
            
            // Lấy ngày hôm nay (YYYY-MM-DD) theo múi giờ local
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const today = `${year}-${month}-${day}`;
            
            debugDiv.innerHTML += `📅 Hôm nay (theo máy tính): ${today}\n`;
            
            // Fetch exams.json
            let exams = [];
            try {
                const res = await fetch('exams.json?t=' + Date.now());
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                exams = await res.json();
                debugDiv.innerHTML += `✅ Đã tải exams.json, số đề: ${exams.length}\n`;
                debugDiv.innerHTML += `📄 Nội dung: ${JSON.stringify(exams, null, 2)}\n`;
            } catch(e) {
                debugDiv.innerHTML += `❌ Lỗi tải exams.json: ${e.message}\n`;
                return;
            }
            
            // Lọc theo lớp (mặc định 11A4)
            const currentClass = "11A4";
            const filtered = exams.filter(ex => ex.class === currentClass);
            debugDiv.innerHTML += `🎓 Lớp chọn: ${currentClass}, số đề phù hợp: ${filtered.length}\n`;
            
            if (filtered.length === 0) {
                deListDiv.innerHTML = `<p>Không có đề nào cho lớp ${currentClass}.</p>`;
                return;
            }
            
            // Xử lý từng đề
            let openList = [];
            let futureList = [];
            let closedList = [];
            
            for (let ex of filtered) {
                debugDiv.innerHTML += `\n--- Đề: ${ex.title} ---\n`;
                debugDiv.innerHTML += `  open : ${ex.open}\n`;
                debugDiv.innerHTML += `  close: ${ex.close}\n`;
                debugDiv.innerHTML += `  today: ${today}\n`;
                
                const isOpen = (today >= ex.open && today <= ex.close);
                const isFuture = (today < ex.open);
                const isClosed = (today > ex.close);
                
                debugDiv.innerHTML += `  >= open ? ${today >= ex.open} (${today} >= ${ex.open})\n`;
                debugDiv.innerHTML += `  <= close? ${today <= ex.close} (${today} <= ${ex.close})\n`;
                debugDiv.innerHTML += `  Kết luận: ${isOpen ? 'ĐANG MỞ' : (isFuture ? 'SẮP MỞ' : 'ĐÃ ĐÓNG')}\n`;
                
                if (isOpen) openList.push(ex);
                else if (isFuture) futureList.push(ex);
                else closedList.push(ex);
            }
            
            // Hiển thị danh sách
            let html = '';
            if (openList.length) {
                html += `<h2>🔥 Đề đang mở</h2>`;
                openList.forEach(ex => {
                    html += `<div><a href="${ex.html}">${ex.title}</a> (hạn: ${ex.close})</div>`;
                });
            } else {
                html += `<h2>🔥 Đề đang mở</h2><p>Không có đề nào đang mở.</p>`;
            }
            if (futureList.length) html += `<h2>📅 Sắp mở</h2>${futureList.map(ex=>`<div>${ex.title} (mở từ ${ex.open})</div>`).join('')}`;
            if (closedList.length) html += `<h2>📚 Đã đóng</h2>${closedList.map(ex=>`<div>${ex.title} (đóng từ ${ex.close})</div>`).join('')}`;
            
            deListDiv.innerHTML = html;
        })();
    </script>
</body>
</html>
