<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Toán - Trang chủ</title>
    <style>
        body { font-family: system-ui; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f3f6fc; }
        h1 { color: #1e3c72; }
        .card { background: white; border-radius: 16px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .de-item { border-left: 5px solid #1e3c72; margin: 12px 0; padding: 8px 12px; background: #f9f9ff; border-radius: 8px; }
        .de-title { font-size: 1.2rem; font-weight: bold; }
        .de-meta { color: #555; font-size: 0.85rem; margin: 5px 0; }
        .btn { background: #1e3c72; color: white; padding: 6px 12px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 8px; }
        .btn-small { font-size: 0.8rem; padding: 4px 10px; }
        .closed { opacity: 0.6; border-left-color: gray; }
        .future { border-left-color: #f39c12; }
        label { font-weight: bold; margin-right: 10px; }
        select { padding: 6px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>📚 Học Toán cùng Thầy</h1>
    <div class="card">
        <label>🧑‍🎓 Chọn lớp của em: </label>
        <select id="classSelect">
            <option value="11A4">11A4</option>
            <option value="11A5">11A5</option>
            <option value="11A6">11A6</option>
        </select>
        <button id="saveClassBtn" style="margin-left: 10px;">Lưu</button>
    </div>

    <div id="deList" class="card">Đang tải đề thi...</div>

    <script>
        let exams = [];
        let currentClass = localStorage.getItem("studentClass") || "11A4";

        document.getElementById("classSelect").value = currentClass;
        document.getElementById("saveClassBtn").onclick = () => {
            localStorage.setItem("studentClass", document.getElementById("classSelect").value);
            currentClass = document.getElementById("classSelect").value;
            renderExams();
        };

        async function loadExams() {
            try {
                const res = await fetch("exams.json");
                exams = await res.json();
                renderExams();
            } catch(e) {
                document.getElementById("deList").innerHTML = "<p>⚠️ Không thể tải danh sách đề. Vui lòng thử lại sau.</p>";
            }
        }

        function renderExams() {
            const today = new Date();
            today.setHours(0,0,0,0);
            const filtered = exams.filter(ex => ex.class === currentClass);
            
            let openList = [];
            let futureList = [];
            let closedList = [];

            filtered.forEach(ex => {
                const openDate = new Date(ex.open);
                const closeDate = new Date(ex.close);
                if (today >= openDate && today <= closeDate) {
                    openList.push(ex);
                } else if (today < openDate) {
                    futureList.push(ex);
                } else {
                    closedList.push(ex);
                }
            });

            let html = "";
            if (openList.length) {
                html += `<h2>🔥 Đề đang mở</h2>`;
                openList.forEach(ex => {
                    html += `<div class="de-item">
                        <div class="de-title">📄 ${ex.title}</div>
                        <div class="de-meta">📅 Hạn nộp: ${ex.close} | Tuần: ${ex.week}</div>
                        <a href="${ex.html}" class="btn btn-small">✍️ Làm bài ngay</a>
                    </div>`;
                });
            } else {
                html += `<h2>🔥 Đề đang mở</h2><p>Hiện chưa có đề mở nào cho lớp ${currentClass}.</p>`;
            }

            if (futureList.length) {
                html += `<h2>📅 Sắp mở</h2>`;
                futureList.forEach(ex => {
                    html += `<div class="de-item future">
                        <div class="de-title">📄 ${ex.title}</div>
                        <div class="de-meta">🕒 Mở từ: ${ex.open} | Tuần: ${ex.week}</div>
                    </div>`;
                });
            }

            if (closedList.length) {
                html += `<h2>📚 Kho đề cũ (đã đóng)</h2>`;
                closedList.forEach(ex => {
                    html += `<div class="de-item closed">
                        <div class="de-title">📄 ${ex.title}</div>
                        <div class="de-meta">⛔ Đã đóng từ: ${ex.close}</div>
                        <a href="${ex.html}" class="btn btn-small">🔍 Xem đề</a>
                    </div>`;
                });
            }

            document.getElementById("deList").innerHTML = html;
        }

        loadExams();
    </script>
</body>
</html>
